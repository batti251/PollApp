<h2 class="title title--xsmall title--secondary">Survey results <b class="title">LIVE</b></h2>

<article class="progress">
@for (question of db.survey().questions; track $index; let i = $index) {
  <section class="progress-section" style="display: flex; flex-direction: column">
    <h3 class="text text--secondary text--tertiary">{{ i + 1 }}. {{ question.questionInput }}</h3>

    @for (answer of question.answers; track $index) {
      <label for="bar"></label>
      <div class="progress-element">
        <span class="text text--secondary text--tertiary">{{ $index | alphabet}}</span>
        <progress
          id="bar"
          class="progress-bar"
          [max]="totalAnswerCounts[i]?.total"
          [value]="answer.checkedCount"
        ></progress>
        <span class="number--percent">{{
          (answer?.checkedCount || 0) / (totalAnswerCounts[i]?.total || 1) | percent
        }}</span>
      </div>
    }
  </section>
}
</article>
