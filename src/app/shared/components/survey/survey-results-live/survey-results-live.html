<h2>Survey results <b>LIVE</b></h2>


@for (question of db.survey().questions; track $index; let i = $index) {
  <section style="display: flex; flex-direction: column;">
  <h3>{{ i }}. {{ question.questionInput }}</h3>

  @for (answer of question.answers; track $index) {
    
    

    <label for="bar"></label>
  <div style="display: flex;">
    <span>{{answer.id}}</span>
    <progress
      id="bar"
      [max]="totalAnswerCounts[i]?.total"
      [value]="answer.checkedCount"
    ></progress>
    <span>{{ ( (answer?.checkedCount || 0) / (totalAnswerCounts[i]?.total || 1) ) | percent }}</span>
  </div>
}
</section>
}
