<div class="btn-wrap">
  <div class="btn-group">
    <button type="button" class="btn btn__past" [class.active]="activeBtn == 0" (click)="setBtnFilter(0)">Active surveys</button>
    <button type="button" class="btn btn__past" [class.active]="activeBtn == 1" (click)="setBtnFilter(1)">Closed surveys</button>
    <button type="button" class="btn btn__past" [class.active]="activeBtn == 2" (click)="setBtnFilter(2)">All surveys</button>
  </div>

  <select
    class="text--white dropdown"
    id="category"
    [value]="selectedCategory ?? ''"
    (change)="setCategoryFilter($event)"
  >
    <option value="">
      Sort by all categories
    </option>

    @for (item of db.category; track item.value) {
      <option
        class="text text--tertiary"
        [value]="item.value"
      >
        {{ item.tag }}
      </option>
    }
  </select>
</div>
