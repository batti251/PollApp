<div class="btn-wrap">
  <div class="btn-group">
    <button class="btn btn__past" id="btn-0" [class.active]="btnIsClicked" (click)="filterSurveyOverview(true);setBtnActive(0)">Active surveys</button>
    <button class="btn btn__past" id="btn-1" [class.active]="btnIsClicked"  (click)="filterSurveyOverview(false);setBtnActive(1)">Closed surveys</button>
    <button class="btn btn__past" id="btn-2" [class.active]="btnIsClicked"  (click)="filterSurveyOverview();setBtnActive(2)">All surveys</button>
  </div>
  <select class="text--white dropdown" id="category" type="text" formControlName="category">
    <button>
      <selectedcontent></selectedcontent>
    </button>
    <option value="" disabled selected hidden>Sort by categories</option>
    @for (item of db.category; track $index) {
      <option
        class="text text--tertiary"
        value="{{ item.value }}"
        (click)="filterSurveysByCategory(item.value)"
      >
        {{ item.tag }}
      </option>
    }
  </select>
</div>
